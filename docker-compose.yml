version: '3.8'

services:
  # Database 1: Postgres (Credentials/Authentication)
  auth-db:
    image: postgres:15
    container_name: leave-app-auth-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dC_it@gn25?
      POSTGRES_DB: auth_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend: FastAPI
  api:
    build: ./backend
    container_name: leave-app-api
    ports:
      - "8000:8000"
    depends_on:
      auth-db:
        condition: service_healthy # Dito hihintayin niyang mag-pass ang healthcheck sa itaas
    environment:
      - PG_USER=postgres
      - PG_PASS=dC_it@gn25?
      - PG_HOST=auth-db
      - PG_PORT=5432
      - PG_DB=auth_db
      - SQL_USER=sa
      - SQL_PASS=Ftp@2024?
      - SQL_HOST=172.96.10.78 
      - SQL_PORT=1433
      - SQL_DB=PayrollDB
    restart: on-failure 

  # Frontend: Vite
  web:
    build: ./frontend
    command: npm run dev -- --host
    container_name: leave-app-web
    ports:
      - "5173:5173"
    depends_on:
      - api
    environment:
      - VITE_API_URL=http://localhost:8000

volumes:
  postgres_data: